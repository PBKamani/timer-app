<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        .inputs {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        input {
            width: 90px;
            height: 55px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
        }

        .timer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: clamp(2.5rem, 12vw, 5.5rem);
            margin-bottom: 50px;
            flex-wrap: nowrap;
        }

        .hours {
            color: red;
        }

        .minutes {
            color: green;
        }

        .seconds {
            color: black;
        }

        .colon {
            color: #555;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        .reset {
            background: #e74c3c;
            color: white;
        }

        .stop {
            background: #333;
            color: white;
        }

        .start-btn {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: black;
            color: white;
            cursor: pointer;
            margin-bottom: 40px;
        }

        /* Mobile */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.7rem;
                margin-bottom: 30px;
            }

            .inputs {
                gap: 10px;
            }

            input {
                width: 75px;
                height: 50px;
                font-size: 20px;
            }

            .timer {
                font-size: 3rem;
                gap: 6px;
                margin-bottom: 40px;
            }

            button {
                padding: 12px 18px;
                font-size: 16px;
            }

            .buttons {
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Countdown Timer</h1>

        <div class="inputs">
            <input type="number" id="hoursInput" placeholder="HH" min="0">
            <input type="number" id="minutesInput" placeholder="MM" min="0" max="59">
            <input type="number" id="secondsInput" placeholder="SS" min="0" max="59">
        </div>

        <button class="start-btn" onclick="startTimer()">
            Start Timer
        </button>

        <div class="timer">
            <span class="hours" id="hours">00</span>
            <span class="colon">:</span>

            <span class="minutes" id="minutes">00</span>
            <span class="colon">:</span>

            <span class="seconds" id="seconds">00</span>
        </div>

        <div class="buttons">
            <button class="reset" onclick="resetTimer()">
                Reset
            </button>

            <button class="stop" onclick="stopTimer()">
                Stop
            </button>
        </div>

    </div>

    <script>
        let timer;
        let totalSeconds = 0;

        function updateDisplay() {
            let hrs = Math.floor(totalSeconds / 3600);
            let mins = Math.floor((totalSeconds % 3600) / 60);
            let secs = totalSeconds % 60;

            document.getElementById("hours").textContent =
                String(hrs).padStart(2, '0');

            document.getElementById("minutes").textContent =
                String(mins).padStart(2, '0');

            document.getElementById("seconds").textContent =
                String(secs).padStart(2, '0');
        }

        function startTimer() {
            clearInterval(timer);

            let h = parseInt(
                document.getElementById("hoursInput").value
            ) || 0;

            let m = parseInt(
                document.getElementById("minutesInput").value
            ) || 0;

            let s = parseInt(
                document.getElementById("secondsInput").value
            ) || 0;

            totalSeconds = h * 3600 + m * 60 + s;

            updateDisplay();

            timer = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(timer);
                    alert("⏰ Time's Up!");
                    return;
                }

                totalSeconds--;
                updateDisplay();
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
        }

        function resetTimer() {
            clearInterval(timer);

            totalSeconds = 0;

            document.getElementById("hoursInput").value = "";
            document.getElementById("minutesInput").value = "";
            document.getElementById("secondsInput").value = "";

            updateDisplay();
        }

        updateDisplay();
    </script>

</body>

</html>
